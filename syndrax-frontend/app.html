<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Syndrax</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/images/synball.png">
  <link rel="stylesheet" href="/style.css?v=29">
  <link rel="stylesheet" href="/app.css?v=22">
  <script>document.documentElement.classList.add("dark");localStorage.setItem("theme","dark");</script>
  <style>
    html,body{margin:0;background:#000;color:#fff;min-height:100vh;font-family:'Space Grotesk',system-ui,sans-serif}
    .dash{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .sx-boot{text-align:center;color:rgba(255,255,255,.45);font-size:13px;letter-spacing:.04em}
    .sx-boot b{display:block;margin-bottom:10px;font-size:11px;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.35);text-transform:uppercase}
    .sx-boot-bar{width:120px;height:2px;margin:14px auto 0;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .sx-boot-bar i{display:block;height:100%;width:40%;background:linear-gradient(90deg,#888,#f5f5f5,#888);animation:sxboot 1.1s ease-in-out infinite}
    @keyframes sxboot{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
  </style>
</head>
<body>
  <div class="dash" id="dashRoot">
    <div class="sx-boot">
      <b>Syndrax</b>
      Loading dashboard
      <div class="sx-boot-bar" aria-hidden="true"><i></i></div>
    </div>
  </div>
  <script src="/extension-check.js"></script>
  <script type="module" src="/dashboard.js"></script>
</body>
</html>
